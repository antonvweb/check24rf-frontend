name: Deploy main (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🛠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔐 Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🧪 Debug ssh-agent
        run: |
          echo "🔍 Проверка добавленных SSH-ключей:"
          ssh-add -l || echo "❌ Ключи не добавлены"

      - name: 🧱 Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          SERVER_IP="${{ secrets.SERVER_IP }}"
          SSH_PORT="${{ secrets.SSH_PORT || '2222' }}"
          echo "🔍 SERVER_IP: $SERVER_IP, PORT: $SSH_PORT"
          if [ -z "$SERVER_IP" ]; then
            echo "❌ SERVER_IP secret is not set"
            exit 1
          fi
          # Указываем порт 2222
          ssh-keyscan -H -p "$SSH_PORT" "$SERVER_IP" >> ~/.ssh/known_hosts 2>&1 || {
            echo "⚠️ ssh-keyscan failed, retrying..."
            sleep 2
            ssh-keyscan -H -p "$SSH_PORT" "$SERVER_IP" >> ~/.ssh/known_hosts 2>&1
          }
        continue-on-error: false

      - name: 🔌 Test SSH connection
        run: |
          echo "🔗 Пробуем подключиться к серверу (порт ${{ secrets.SSH_PORT || '2222' }})..."
          ssh -p ${{ secrets.SSH_PORT || '2222' }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
              "echo ✅ SSH connection established"

      - name: 🔄 Sync project to server
        run: |
          echo "📤 Копируем файлы на сервер (порт ${{ secrets.SSH_PORT || '2222' }})..."
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT || '2222' }}" \
            --exclude node_modules \
            --exclude .git \
            --exclude .gitignore \
            --exclude *.log \
            --exclude .env \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy app (main)
        run: |
          ssh -p ${{ secrets.SSH_PORT || '2222' }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -ex
            cd ${{ secrets.DEPLOY_PATH }}
            npm ci
            npm run build
            pm2 delete check24rf-domain || true
            pm2 start ecosystem.config.js
            pm2 save
          EOF
