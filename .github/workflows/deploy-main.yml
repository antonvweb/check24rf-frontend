name: Deploy dev (Test)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🛠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔐 Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🧪 Debug ssh-agent
        run: |
          echo "🔍 Проверка добавленных SSH-ключей:"
          ssh-add -l || echo "❌ Ключи не добавлены"

      - name: 🧱 Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          if [ -z "${{ secrets.SERVER_IP }}" ]; then
            echo "❌ SERVER_IP secret is not set"
            exit 1
          fi
          # 👇 ВАЖНО: добавляем порт 2222
          ssh-keyscan -H -p ${{ secrets.SSH_PORT || '2222' }} ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
        continue-on-error: false

      - name: 🔌 Test SSH connection
        run: |
          echo "🔗 Пробуем подключиться к серверу на порту ${{ secrets.SSH_PORT || '2222' }}..."
          # 👇 ВАЖНО: указываем порт
          ssh -p ${{ secrets.SSH_PORT || '2222' }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
              "echo ✅ SSH connection established on port ${{ secrets.SSH_PORT || '2222' }}"

      - name: 🔄 Sync project to server
        run: |
          echo "📤 Копируем файлы на сервер (порт ${{ secrets.SSH_PORT || '2222' }})..."
          # 👇 ВАЖНО: указываем порт в rsync через -e
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT || '2222' }}" \
            --exclude node_modules \
            --exclude .git \
            --exclude .gitignore \
            --exclude *.log \
            --exclude .env \
            --exclude .github \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DEV_PATH }}/

      - name: 🚀 Deploy app (dev)
        run: |
          # 👇 ВАЖНО: указываем порт
          ssh -p ${{ secrets.SSH_PORT || '2222' }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -ex
            cd ${{ secrets.DEPLOY_DEV_PATH }}
          
            # Проверяем наличие package.json
            if [ ! -f "package.json" ]; then
              echo "❌ package.json not found!"
              exit 1
            fi
          
            # Устанавливаем зависимости
            echo "📦 Installing dependencies..."
            npm ci
          
            # Собираем проект
            echo "🏗️ Building project..."
            if grep -q '"build"' package.json; then
              npm run build
            else
              echo "⚠️ No build script found, skipping..."
            fi
          
            # Запускаем/перезапускаем PM2
            echo "🔄 Restarting PM2..."
            pm2 delete check24rf-domain 2>/dev/null || true
            pm2 start ecosystem.config.js --env dev
            pm2 save
          
            echo "📊 PM2 status:"
            pm2 list
          EOF